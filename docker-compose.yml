services:
  db:
    image: chromadb/chroma:latest
    volumes:
      - chroma_db:/data

  agent-core:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      - db
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
  
  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: agentcore_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  chroma_db:
  postgres_data: